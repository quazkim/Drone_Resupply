name: Benchmark TS-ALNS-LSP Solver

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Instances to run'
        required: true
        default: 'n10'
        type: choice
        options:
          - n10      # 45 instances,  ~40 min with 4 workers
          - n15      # 45 instances,  ~60 min with 4 workers
          - n20      # 45 instances,  ~60 min with 4 workers
          - all      # 135 instances, ~2.5 h  with 4 workers
      time_n10:
        description: 'Time budget for n=10 instances (seconds)'
        required: true
        default: '150'
      time_n1520:
        description: 'Time budget for n=15/20 instances (seconds)'
        required: true
        default: '300'
      lsp_cutoff:
        description: 'CP-SAT cutoff per LSP call (seconds)'
        required: true
        default: '3'
      workers:
        description: 'Parallel workers (2–4 recommended)'
        required: true
        default: '4'

env:
  OR_TOOLS_DIR: "/opt/or-tools"

jobs:
  # ──────────────────────────────────────────────────────
  # Job 1: Build pdp_solver with OR-Tools + CMake
  # ──────────────────────────────────────────────────────
  build:
    name: Build (ubuntu-latest + OR-Tools)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache OR-Tools
        id: cache-ortools
        uses: actions/cache@v4
        with:
          path: ${{ env.OR_TOOLS_DIR }}
          key: ortools-9.11-${{ runner.os }}-${{ runner.arch }}

      - name: Download & install OR-Tools
        if: steps.cache-ortools.outputs.cache-hit != 'true'
        run: |
          UBUNTU_VER=$(lsb_release -rs)
          echo "Ubuntu: $UBUNTU_VER"
          PRIMARY_URL="https://github.com/google/or-tools/releases/download/v9.11/or-tools_amd64_ubuntu-${UBUNTU_VER}_cpp_v9.11.4210.tar.gz"
          FALLBACK_URL="https://github.com/google/or-tools/releases/download/v9.11/or-tools_amd64_ubuntu-22.04_cpp_v9.11.4210.tar.gz"
          wget -q "$PRIMARY_URL" -O or-tools.tar.gz || wget -q "$FALLBACK_URL" -O or-tools.tar.gz
          sudo mkdir -p "$OR_TOOLS_DIR"
          sudo tar -xzf or-tools.tar.gz -C "$OR_TOOLS_DIR" --strip-components=1
          rm or-tools.tar.gz
          echo "OR-Tools installed at $OR_TOOLS_DIR"
          ls "$OR_TOOLS_DIR/lib/" | grep ortools | head -5

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake g++ libz-dev

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/
          key: cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'src/**') }}
          restore-keys: cmake-${{ runner.os }}-

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$OR_TOOLS_DIR"

      - name: Build
        run: cmake --build build --target pdp_solver -j$(nproc)

      - name: Verify binary
        run: |
          file pdp_solver
          ldd pdp_solver | grep -i ortools || true

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pdp_solver-linux
          path: pdp_solver
          retention-days: 1

  # ──────────────────────────────────────────────────────
  # Job 2: Run benchmark
  # ──────────────────────────────────────────────────────
  benchmark:
    name: Benchmark (${{ inputs.scope }})
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 210

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download solver binary
        uses: actions/download-artifact@v4
        with:
          name: pdp_solver-linux
          path: .

      - name: Make binary executable
        run: chmod +x pdp_solver

      - name: Cache OR-Tools
        id: cache-ortools
        uses: actions/cache@v4
        with:
          path: ${{ env.OR_TOOLS_DIR }}
          key: ortools-9.11-${{ runner.os }}-${{ runner.arch }}

      - name: Download OR-Tools (cache miss)
        if: steps.cache-ortools.outputs.cache-hit != 'true'
        run: |
          UBUNTU_VER=$(lsb_release -rs)
          PRIMARY_URL="https://github.com/google/or-tools/releases/download/v9.11/or-tools_amd64_ubuntu-${UBUNTU_VER}_cpp_v9.11.4210.tar.gz"
          FALLBACK_URL="https://github.com/google/or-tools/releases/download/v9.11/or-tools_amd64_ubuntu-22.04_cpp_v9.11.4210.tar.gz"
          wget -q "$PRIMARY_URL" -O or-tools.tar.gz || wget -q "$FALLBACK_URL" -O or-tools.tar.gz
          sudo mkdir -p "$OR_TOOLS_DIR"
          sudo tar -xzf or-tools.tar.gz -C "$OR_TOOLS_DIR" --strip-components=1
          rm or-tools.tar.gz

      - name: Set LD_LIBRARY_PATH
        run: echo "LD_LIBRARY_PATH=$OR_TOOLS_DIR/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Smoke test (20s)
        run: |
          ./pdp_solver "Instances 2/U_10_0.5_Num_1.txt" \
            --depot 0 --lsp 3 --run 1 --time 20 2>&1 | \
            grep -E "C_max|Feasible|RUNTIME"

      - name: Run benchmark
        run: |
          chmod +x scripts/run_benchmark_ci.sh
          bash scripts/run_benchmark_ci.sh \
            "${{ inputs.scope }}" \
            "${{ inputs.time_n10 }}" \
            "${{ inputs.time_n1520 }}" \
            "${{ inputs.lsp_cutoff }}" \
            "${{ inputs.workers }}"

      - name: Write job summary
        if: always()
        run: |
          CSV=$(ls results/comparison_ci_*.csv 2>/dev/null | head -1)
          if [[ -z "$CSV" ]]; then
            echo "❌ No results CSV found" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          python3 - "$CSV" "${{ inputs.scope }}" "${{ inputs.time_n10 }}" "${{ inputs.time_n1520 }}" >> $GITHUB_STEP_SUMMARY <<'PYEOF'
          import sys, csv
          path, scope, t10, t1520 = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
          rows = list(csv.DictReader(open(path), delimiter=';'))
          gaps = []
          for r in rows:
              try: gaps.append(float(r['Gap (%)'].replace('%','')))
              except: pass
          total  = len(rows)
          valid  = len(gaps)
          avg    = sum(gaps)/valid if valid else float('nan')
          mn     = min(gaps) if valid else float('nan')
          mx     = max(gaps) if valid else float('nan')
          better = sum(1 for g in gaps if g < 0)
          print(f"## 📊 Benchmark Results — scope={scope}")
          print(f"| Metric | Value |")
          print(f"|--------|-------|")
          print(f"| Total instances | {total} |")
          print(f"| Valid results | {valid} |")
          print(f"| **Avg gap vs MILP** | **{avg:.2f}%** |")
          print(f"| Min gap | {mn:.2f}% |")
          print(f"| Max gap | {mx:.2f}% |")
          print(f"| Better than MILP | {better}/{valid} |")
          print()
          print("### By instance size")
          print("| Size | Avg gap | Better |")
          print("|------|---------|--------|")
          for size in [10, 15, 20]:
              sg = [float(r['Gap (%)'].replace('%','')) for r in rows
                    if r['Customers']==str(size) and r.get('Gap (%)','N/A')!='N/A']
              if sg:
                  b = sum(1 for g in sg if g < 0)
                  print(f"| n={size} | {sum(sg)/len(sg):.2f}% | {b}/{len(sg)} |")
          PYEOF

      - name: Upload CSV results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ inputs.scope }}-run${{ github.run_number }}
          path: results/comparison_ci_*.csv
          retention-days: 30
